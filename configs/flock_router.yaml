experiment:
  name: flock_router_run1
  output_dir: /content/camtrap-detector-lab/runs
data:
  input_dir: /content/drive/MyDrive/평두메5/TestSamples
  video_exts:
  - .MP4
  - .MOV
  preprocess:
    fps: 6
    max_side: 0
    clip_seconds: null
model:
  name: mdv6
  device: cuda
  conf: 0.25
  version: MDV6-yolov10-e
strategy:
  name: flock_router
  flock_th: 4             # 프레임당 검출 수 >= 이 값이면 '새 떼'로 판정
  night_sat_th: 10        # HSV 채도 평균 < 이 값이면 야간(IR)
  bird_label: bird        # 새 떼 경로의 최종 라벨 (종분류 CNN 제외)
  day_merge:  {pad: 0.0, merge_iou: 0.70, merge_ioa: 0.95}   # 주간: 보수적 병합
  night_merge: {pad: 0.2, merge_iou: 0.20, merge_ioa: 0.50}  # 야간: 공격적 병합
  day_models:             # 주간 조류: RT-DETR + YOLO-World 앙상블 (자동 다운로드)
    - name: yoloworld
      weights: yolov8x-worldv2.pt
      classes: ["duck", "bird"]
      conf: 0.25
      device: cuda
    - name: rtdetr
      weights: rtdetr-x.pt
      keep_class_ids: [14]     # COCO bird
      conf: 0.25
      device: cuda
  night_model:            # 야간 조류: SAM3 (gated). 다운로드/로드 실패 시에만 MD 폴백
    name: sam3_ultra
    weights: ""              # 로컬 sam3.pt 가 있으면 그 경로. 없으면 아래 hf_repo 로 다운로드
    hf_repo: "facebook/sam3" # gated: huggingface.co/facebook/sam3 접근 승인 + HF_TOKEN 필요
    hf_filename: "sam3.pt"   # ⚠️ repo 안의 실제 .pt 파일명으로 확인/수정하세요
    prompts: ["duck", "bird"]
    conf: 0.25
    quantize: 16
    device: cuda
results:
  save_masks: none
  save_viz: true
  viz_max_side: 960
  viz_fps: 2
  viz_crf: 30
  viz_draw_masks: true
  push_every_video: true
git:
  enabled: false
  repo_dir: /content/camtrap-detector-lab
  remote: origin
  branch: main
  author_name: JJ1NNU
  author_email: jinwo1111@uos.ac.kr
