experiment:
  name: flock_router_run1
  output_dir: /content/camtrap-detector-lab/runs
data:
  input_dir: /content/drive/MyDrive/평두메5/TestSamples
  video_exts:
  - .MP4
  - .MOV
  preprocess:
    fps: 6
    max_side: 0
    clip_seconds: null
model:
  name: mdv6
  device: cuda
  conf: 0.25
  version: MDV6-yolov10-e
strategy:
  name: flock_router
  flock_th: 4
  night_sat_th: 10
  bird_label: bird
  day_merge:
    pad: 0.0
    merge_iou: 0.7
    merge_ioa: 0.95
  night_merge:
    pad: 0.2
    merge_iou: 0.2
    merge_ioa: 0.5
  day_models:
  - name: yoloworld
    weights: yolov8x-worldv2.pt
    classes:
    - duck
    - bird
    conf: 0.25
    device: cuda
  - name: rtdetr
    weights: rtdetr-x.pt
    keep_class_ids:
    - 14
    conf: 0.25
    device: cuda
  night_model:
    name: sam3_ultra
    weights: /content/sam3.pt
    prompts:
    - duck
    - bird
    conf: 0.25
    quantize: 16
    device: cuda
results:
  save_masks: none
  save_viz: true
  viz_max_side: 960
  viz_fps: 2
  viz_crf: 30
  viz_draw_masks: true
  push_every_video: true
git:
  enabled: false
  repo_dir: /content/camtrap-detector-lab
  remote: origin
  branch: main
  author_name: JJ1NNU
  author_email: jinwo1111@uos.ac.kr
