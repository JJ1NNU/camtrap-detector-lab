experiment:
  name: sam3_sahi_run1
  output_dir: /content/camtrap-detector-lab/runs

data:
  input_dir: /content/drive/MyDrive/YOUR_DATA_DIR
  video_exts: [".MP4", ".MOV", ".mp4", ".mov"]
  preprocess:
    fps: 2            # SAM 3 is heavy; sample sparsely
    max_side: 1920
    clip_seconds: 10  # first 10 seconds only (optional)

model:
  name: sam3          # -> SAM 3 image concept detector (bbox + mask)
  device: cuda
  conf: 0.3
  prompts: ["animal", "bird"]
  autocast_dtype: float16    # T4
  checkpoint_path: null      # null = HF default (facebook/sam3, gated)
  bpe_path: null

strategy:
  name: sahi
  tile_size: 640
  overlap: 0.2
  full_frame_pass: true
  nms_iou: 0.5

results:
  save_masks: rle        # none | area | polygon | rle  (CSV 마스크 정밀도/용량)
  mask_polygon_max_pts: 60   # polygon일 때 외곽선 점 수 (작을수록 CSV 가벼움)
  save_viz: false            # 주석 영상(mp4) 저장 여부
  viz_max_side: 960          # 주석 영상 긴 변 px (작을수록 용량↓)
  viz_fps: 6                 # 주석 영상 fps (작을수록 용량↓)
  viz_crf: 30                # H.264 품질 (23=큼/고화질, 28=기본, 32=작음)
  viz_draw_masks: true       # 마스크 오버레이 (false면 bbox만, 더 가벼움)
  push_every_video: true     # 영상마다 git push (실시간 업로드)

git:
  enabled: true
  repo_dir: /content/camtrap-detector-lab
  remote: origin
  branch: main
  author_name: colab-bot
  author_email: colab@example.com
